name: 量子コンピューター 毎日自動更新
 
on:
  schedule:
    - cron: '0 23 * * *'   # 毎日 23:00 UTC = 翌日 08:00 JST
  workflow_dispatch:         # 手動実行ボタンも有効
 
jobs:
  quantum-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
 
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt
 
      - name: 量子コンピューター情報を収集・登録・通知
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: CA4N4ETA7
        run: python quantum_daily.py
 
      - name: Excel レポートをアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: quantum-report-${{ github.run_number }}
          path: quantum_computers_*.xlsx
          retention-days: 30

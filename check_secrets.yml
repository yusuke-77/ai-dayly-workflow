name: Secrets 設定確認（動作テスト用）
 
on:
  workflow_dispatch:   # 手動実行のみ
 
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Secrets の存在確認
        run: |
          echo "=== Secrets チェック ==="
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "? ANTHROPIC_API_KEY が未設定です"
          else
            echo "? ANTHROPIC_API_KEY: 設定済み（長さ: ${#ANTHROPIC_API_KEY}文字）"
          fi
 
          if [ -z "$SUPABASE_URL" ]; then
            echo "? SUPABASE_URL が未設定です"
          else
            echo "? SUPABASE_URL: $SUPABASE_URL"
          fi
 
          if [ -z "$SUPABASE_KEY" ]; then
            echo "? SUPABASE_KEY が未設定です"
          else
            echo "? SUPABASE_KEY: 設定済み（長さ: ${#SUPABASE_KEY}文字）"
          fi
 
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "? SLACK_BOT_TOKEN が未設定です"
          else
            echo "? SLACK_BOT_TOKEN: 設定済み（長さ: ${#SLACK_BOT_TOKEN}文字）"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
 
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: ライブラリインストール確認
        run: |
          pip install anthropic supabase slack-sdk openpyxl
          echo "? 全ライブラリのインストール成功"
 
      - name: Supabase 接続テスト
        run: |
          python - <<'EOF'
          import os
          from supabase import create_client
          url = os.environ.get("SUPABASE_URL", "")
          key = os.environ.get("SUPABASE_KEY", "")
          if not url or not key:
              print("? Supabase の接続情報が未設定です")
              exit(1)
          try:
              sb = create_client(url, key)
              result = sb.table("quantum_computers").select("id").limit(1).execute()
              print(f"? Supabase 接続成功（quantum_computers テーブル確認済み）")
          except Exception as e:
              print(f"? Supabase 接続エラー: {e}")
              exit(1)
          EOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
 
      - name: Slack 接続テスト
        run: |
          python - <<'EOF'
          import os
          from slack_sdk import WebClient
          token = os.environ.get("SLACK_BOT_TOKEN", "")
          if not token:
              print("? SLACK_BOT_TOKEN が未設定です")
              exit(1)
          try:
              client = WebClient(token=token)
              res = client.auth_test()
              print(f"? Slack 接続成功（Bot: {res['bot_id']}）")
          except Exception as e:
              print(f"? Slack 接続エラー: {e}")
              exit(1)
          EOF
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
 
      - name: "? 全チェック完了 ? quantum_daily.yml を実行する準備ができています"
        run: echo "全ての接続確認が完了しました！"
 